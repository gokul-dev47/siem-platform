input {
  tcp {
    port => 5001
    codec => json_lines
    tags => ["siem-generator"]
  }
  udp {
    port => 5000
    codec => plain
    tags => ["syslog"]
  }
  beats {
    port => 5044
    tags => ["filebeat"]
  }
}

filter {
  # Parse syslog format
  if "syslog" in [tags] {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}: %{GREEDYDATA:syslog_message}" }
    }
    date { match => ["syslog_timestamp", "MMM d HH:mm:ss", "MMM dd HH:mm:ss"] }
  }

  # Enrich with geo IP if available
  if [source_ip] and [source_ip] != "" {
    mutate {
      add_field => { "[@metadata][source_ip]" => "%{source_ip}" }
    }
  }

  # Normalize severity
  if ![severity] {
    mutate { add_field => { "severity" => "info" } }
  }

  # Add ingestion timestamp
  mutate {
    add_field => { "ingest_time" => "%{@timestamp}" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "siem-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  # stdout { codec => rubydebug }  # uncomment for debug
}
