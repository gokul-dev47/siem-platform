name: SIEM Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint Python & Validate Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install flake8 bandit safety

      - name: Lint backend with flake8
        run: |
         flake8 backend/app.py \
         --max-line-length=120 \
         --ignore=E501,W503,E402,E225,E231,E302,E305 \
         --exclude=__pycache__

      - name: Security scan with bandit
        run: |
          bandit -r backend/app.py \
            -ll \
            --exclude /test \
            --skip B104,B108 \
            -f txt || true   # don't fail CI on warnings, just report

      - name: Validate alert_rules.json
        run: |
          python3 -c "
          import json, sys
          with open('backend/alert_rules.json') as f:
              data = json.load(f)
          rules = data.get('rules', [])
          assert len(rules) > 0, 'No rules found'
          for r in rules:
              assert 'id' in r,        f'Missing id in rule: {r}'
              assert 'threshold' in r,  f'Missing threshold in rule: {r}'
              assert 'severity' in r,   f'Missing severity in rule: {r}'
          print(f'✅ {len(rules)} rules validated')
          "

      - name: Validate docker-compose.yml
        run: |
          docker compose config --quiet
          echo "✅ docker-compose.yml is valid"

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: siem-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build log-generator image
        uses: docker/build-push-action@v5
        with:
          context: ./log-generator
          file: ./log-generator/Dockerfile
          push: false
          tags: siem-log-generator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report build success
        run: |
          echo "✅ All Docker images built successfully"
          echo "   Backend:       siem-backend:${{ github.sha }}"
          echo "   Log Generator: siem-log-generator:${{ github.sha }}"

