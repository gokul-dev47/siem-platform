<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SIEM OPS — Alerts</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .count-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .count-chip{
      display:flex;align-items:center;gap:10px;
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--r-lg);padding:10px 18px;
    }
    .count-chip .num{font-family:var(--font-brand);font-size:24px;font-weight:700}
    .count-chip .lbl{font-size:11px;font-family:var(--font-mono);color:var(--text-2)}
    .count-chip.critical .num{color:var(--red)}
    .count-chip.high     .num{color:var(--orange)}
    .count-chip.medium   .num{color:var(--yellow)}
    .count-chip.low      .num{color:var(--cyan)}
    .tab-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
    .tab{
      padding:6px 18px;border-radius:20px;border:1px solid var(--border);
      background:var(--bg-card);color:var(--text-2);font-family:var(--font-mono);
      font-size:11px;cursor:pointer;transition:all 0.15s;
    }
    .tab:hover,.tab.on{border-color:var(--cyan-dim);color:var(--cyan);background:var(--cyan-glow)}
    .tab[data-sev="critical"].on{border-color:var(--red);color:var(--red);background:var(--red-glow)}
    .tab[data-sev="high"].on    {border-color:var(--orange);color:var(--orange);background:rgba(255,140,0,0.1)}
  </style>
</head>
<body>
<div class="app-shell">
  <header class="header">
    <a href="index.html" class="header-brand">SIEM<span>//</span>OPS</a>
    <div class="header-pill alert">
      <div class="dot dot-red"></div>
      <span class="lbl">Open</span>
      <span class="val" id="open-count">—</span>
    </div>
    <div class="header-sep"></div>
    <button class="btn btn-ghost btn-sm" onclick="window.print()">⬇ Export PDF</button>
  </header>
  <nav class="sidebar">
    <div class="nav-section">Navigation</div>
    <a href="index.html"    class="nav-item"><span class="nav-icon">▦</span>Dashboard</a>
    <a href="logs.html"     class="nav-item"><span class="nav-icon">≡</span>Logs</a>
    <a href="alerts.html"   class="nav-item active"><span class="nav-icon">◎</span>Alerts</a>
    <a href="rules.html"    class="nav-item"><span class="nav-icon">⊛</span>Rules</a>
    <a href="map.html"      class="nav-item"><span class="nav-icon">◈</span>Attack Map</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span>Settings</a>
    <div class="sidebar-footer"><strong>SIEM Platform v1.0</strong><br>Real-time Threat Detection</div>
  </nav>
  <main class="main-content">
    <div class="page-hdr">
      <div>
        <div class="page-title">Security <span>Alerts</span></div>
        <div class="page-sub">Real-time threat alerts — update status to track investigation</div>
      </div>
      <button class="btn btn-primary" onclick="loadAlerts()">↻ Refresh</button>
    </div>

    <div class="count-row">
      <div class="count-chip critical"><span class="num" id="cnt-critical">—</span><span class="lbl">Critical</span></div>
      <div class="count-chip high">    <span class="num" id="cnt-high">—</span>    <span class="lbl">High</span></div>
      <div class="count-chip medium">  <span class="num" id="cnt-medium">—</span>  <span class="lbl">Medium</span></div>
      <div class="count-chip low">     <span class="num" id="cnt-low">—</span>     <span class="lbl">Low</span></div>
    </div>

    <div class="tab-row">
      <button class="tab on"  data-sev=""         onclick="setFilter(this,'')">All</button>
      <button class="tab"     data-sev="critical"  onclick="setFilter(this,'critical')">Critical</button>
      <button class="tab"     data-sev="high"      onclick="setFilter(this,'high')">High</button>
      <button class="tab"     data-sev="medium"    onclick="setFilter(this,'medium')">Medium</button>
      <button class="tab"     data-sev="low"       onclick="setFilter(this,'low')">Low</button>
      <button class="tab"     data-sev="open"      onclick="setStatus('open')">Open</button>
      <button class="tab"     data-sev="invest"    onclick="setStatus('investigating')">Investigating</button>
      <button class="tab"     data-sev="closed"    onclick="setStatus('closed')">Closed</button>
    </div>

    <div class="alert-grid" id="alert-cards">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-2)">
        <div class="spinner" style="margin:0 auto 10px"></div>Loading alerts...
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="dashboard.js"></script>
<script>
  let allAlerts=[],curSev='',curStatus='';
  async function loadAlerts(){
    try{
      const d=await fetch('/api/alerts').then(r=>r.json());
      allAlerts=d.alerts||[];
      const byS={critical:0,high:0,medium:0,low:0};
      allAlerts.forEach(a=>{if(byS[a.severity]!==undefined)byS[a.severity]++});
      Object.entries(byS).forEach(([s,n])=>{const el=document.getElementById('cnt-'+s);if(el)el.textContent=n});
      document.getElementById('open-count').textContent=allAlerts.filter(a=>a.status==='open').length;
      renderCards();
    }catch(e){console.warn(e)}
  }
  function renderCards(){
    const c=document.getElementById('alert-cards');
    let f=allAlerts;
    if(curSev)   f=f.filter(a=>a.severity===curSev);
    if(curStatus)f=f.filter(a=>a.status===curStatus);
    if(!f.length){c.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--text-2)">No alerts match filter</div>';return}
    c.innerHTML=f.map(a=>{
      const sev=a.severity||'low';
      const ts=new Date(a.timestamp).toLocaleString();
      const stCol={open:'color:var(--red)',investigating:'color:var(--orange)',closed:'color:var(--green)'}[a.status]||'';
      return `<div class="alert-card ${sev}">
        <div class="pulse ${sev}"></div>
        <div class="alert-card-hdr">
          <div>
            <div class="alert-card-name">${esc(a.rule_name||'Unknown Rule')}</div>
            <span class="badge badge-${sev}" style="margin-top:5px">${sev}</span>
          </div>
          <select class="status-sel" style="${stCol}" onchange="updateStatus('${a.id||a.alert_id}',this.value,this)">
            <option value="open"          ${a.status==='open'?'selected':''}>Open</option>
            <option value="investigating" ${a.status==='investigating'?'selected':''}>Investigating</option>
            <option value="closed"        ${a.status==='closed'?'selected':''}>Closed</option>
          </select>
        </div>
        <div class="alert-card-body">
          <span class="key">Source IP: </span>${a.source_ip||'—'}<br>
          <span class="key">Count: </span>${a.count||1} &nbsp;
          <span class="key">Time: </span>${ts}<br>
          <span style="color:var(--text-1)">${esc(a.description||'')}</span>
        </div>
        <div class="alert-card-actions">
          <button class="btn btn-ghost btn-sm" onclick="navigator.clipboard?.writeText('${a.source_ip||''}');showToast('success','Copied','${a.source_ip||''} → clipboard')">Copy IP</button>
          <button class="btn btn-danger btn-sm" onclick="showToast('critical','Blocked','${a.source_ip||''} added to blocklist')">Block IP</button>
        </div>
      </div>`;
    }).join('');
  }
  async function updateStatus(id,status,sel){
    try{
      await fetch(`/api/alerts/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
      const stCol={open:'color:var(--red)',investigating:'color:var(--orange)',closed:'color:var(--green)'}[status]||'';
      sel.style.cssText=stCol;
      showToast('success','Updated',`Status → ${status}`);
      const a=allAlerts.find(x=>(x.id||x.alert_id)===id);if(a)a.status=status;
    }catch(e){showToast('high','Error','Update failed')}
  }
  function setFilter(btn,sev){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');curSev=sev;curStatus='';renderCards()}
  function setStatus(s){curStatus=s;curSev='';document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));renderCards()}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  loadAlerts();setInterval(loadAlerts,15000);
</script>
</body>
</html>
